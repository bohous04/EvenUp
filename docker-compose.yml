# Self-hosting EvenUp: web + PostgreSQL + MinIO (S3-compatible receipt storage).
# Copy .env.example to .env and adjust before `docker compose up -d`.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-evenup}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-evenup}
      POSTGRES_DB: ${POSTGRES_DB:-evenup}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-evenup}']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY:-evenup}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY:-evenup-secret}
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio-data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-evenup}:${POSTGRES_PASSWORD:-evenup}@db:5432/${POSTGRES_DB:-evenup}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?set ENCRYPTION_KEY in .env}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?set BETTER_AUTH_SECRET in .env}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      DEFAULT_OCR_MODEL: ${DEFAULT_OCR_MODEL:-google/gemini-2.5-flash}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:-evenup}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:-evenup-secret}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    ports:
      - '3000:3000'

volumes:
  db-data:
  minio-data:
