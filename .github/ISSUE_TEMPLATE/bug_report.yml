name: Bug report
description: Report a problem with EvenUp
labels: ['bug']
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including what you expected.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click '...'
        3. See error
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Web
        - Mobile
        - Split / debt math (core)
        - OCR
        - Settlement / SPAYD
        - Self-hosting / Docker
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: OS, browser/device, self-hosted or not
