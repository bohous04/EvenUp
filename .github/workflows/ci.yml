name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_TELEMETRY_DISABLED: '1'

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @evenup/db exec prisma generate
      - run: pnpm format:check
      - run: pnpm lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @evenup/db exec prisma generate
      - run: pnpm typecheck

  test:
    name: Unit + integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: evenup
          POSTGRES_PASSWORD: evenup
          POSTGRES_DB: evenup_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U evenup"
          --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgresql://evenup:evenup@localhost:5432/evenup_test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @evenup/db exec prisma generate
      - run: pnpm --filter @evenup/db exec prisma migrate deploy
      # Enforces coverage gates (packages/core >= 95%).
      - run: pnpm turbo run test:coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: packages/*/coverage
          if-no-files-found: ignore

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @evenup/db exec prisma generate
      - run: pnpm --filter @evenup/web build
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/db
          BETTER_AUTH_SECRET: ci-build-secret-000000000000000000000000

  e2e-web:
    name: E2E (web)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: evenup
          POSTGRES_PASSWORD: evenup
          POSTGRES_DB: evenup_e2e
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U evenup"
          --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgresql://evenup:evenup@localhost:5432/evenup_e2e
      ENCRYPTION_KEY: 0f1e2d3c4b5a69788796a5b4c3d2e1f00f1e2d3c4b5a69788796a5b4c3d2e1f0
      BETTER_AUTH_SECRET: e2e-secret-000000000000000000000000
      BETTER_AUTH_URL: http://localhost:3100
      AUTH_DEV_ECHO: 'true'
      ADMIN_EMAILS: admin@example.com
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @evenup/db exec prisma generate
      - run: pnpm --filter @evenup/db exec prisma migrate deploy
      - run: pnpm --filter @evenup/web exec playwright install --with-deps
      - run: pnpm --filter @evenup/web build
      - run: pnpm --filter @evenup/web test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report
          if-no-files-found: ignore

  e2e-mobile:
    name: E2E (mobile)
    runs-on: ubuntu-latest
    # Maestro flows run on PRs touching mobile, plus the nightly full run.
    if: github.event_name == 'schedule' || contains(github.event.head_commit.message, '[mobile]')
    steps:
      - uses: actions/checkout@v4
      - run: echo "Maestro mobile E2E runs in the nightly workflow (see apps/mobile/.maestro)."
