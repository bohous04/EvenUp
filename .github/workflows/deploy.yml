name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  docker:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      # GHCR/Docker require the image repository to be lowercase, but
      # ${{ github.repository }} preserves the repo's casing (bohous04/EvenUp),
      # which buildx rejects. Lowercase it here via bash parameter expansion.
      - name: Compute lowercase image name
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}/web" >> "$GITHUB_ENV"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_GOOGLE_ENABLED=${{ vars.NEXT_PUBLIC_GOOGLE_ENABLED }}
            NEXT_PUBLIC_APPLE_ENABLED=${{ vars.NEXT_PUBLIC_APPLE_ENABLED }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to LNRT Coolify
    needs: docker
    runs-on: ubuntu-latest
    env:
      COOLIFY_WEBHOOK: ${{ secrets.COOLIFY_WEBHOOK }}
      COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
      DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
    steps:
      # Coolify's GitHub App can auto-deploy on push; this also supports an
      # explicit webhook trigger. Migrations run from the container entrypoint
      # (`prisma migrate deploy`) on boot (PRD §11.2).
      - name: Trigger Coolify deployment
        if: env.COOLIFY_WEBHOOK != ''
        run: |
          curl -fsSL -X POST "$COOLIFY_WEBHOOK" \
            -H "Authorization: Bearer $COOLIFY_TOKEN" \
            || { echo "Coolify webhook failed"; exit 1; }

      - name: Wait for rollout
        if: env.DEPLOY_URL != ''
        run: sleep 30

      - name: Post-deploy smoke test
        if: env.DEPLOY_URL != ''
        run: |
          for i in $(seq 1 10); do
            if curl -fsS "$DEPLOY_URL/api/health" | grep -q '"status":"ok"'; then
              echo "Smoke test passed"; exit 0
            fi
            echo "Attempt $i: not healthy yet"; sleep 10
          done
          echo "Smoke test failed"; exit 1
